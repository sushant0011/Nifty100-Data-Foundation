# screener_config.yaml — All threshold definitions for the Nifty100 Screener
# Edit thresholds here without touching any Python code

metrics:
  roe_min:              { column: return_on_equity_pct,        operator: ">=" }
  de_max:               { column: debt_to_equity,              operator: "<=" }
  fcf_min:              { column: free_cash_flow_cr,           operator: ">=" }
  revenue_cagr_5yr_min: { column: revenue_cagr_5yr,           operator: ">=" }
  pat_cagr_5yr_min:     { column: pat_cagr_5yr,               operator: ">=" }
  opm_min:              { column: operating_profit_margin_pct, operator: ">=" }
  pe_max:               { column: pe_ratio,                    operator: "<=" }
  pb_max:               { column: pb_ratio,                    operator: "<=" }
  dividend_yield_min:   { column: dividend_yield,              operator: ">=" }
  icr_min:              { column: interest_coverage,           operator: ">=" }
  market_cap_min:       { column: market_cap,                  operator: ">=" }
  net_profit_min:       { column: net_profit_margin_pct,       operator: ">=" }
  eps_cagr_min:         { column: eps_cagr_5yr,               operator: ">=" }
  asset_turnover_min:   { column: asset_turnover,              operator: ">=" }
  sales_min:            { column: sales,                       operator: ">=" }

presets:
  quality_compounder:
    label: "Quality Compounder"
    description: "High ROE, low debt, positive FCF, strong revenue growth"
    filters:
      roe_min: 15
      de_max: 1.0
      fcf_min: 0
      revenue_cagr_5yr_min: 10

  value_pick:
    label: "Value Pick"
    description: "Low valuation multiples with reasonable debt"
    filters:
      pe_max: 20
      pb_max: 3.0
      de_max: 2.0
      dividend_yield_min: 1

  growth_accelerator:
    label: "Growth Accelerator"
    description: "High PAT and revenue growth with manageable debt"
    filters:
      pat_cagr_5yr_min: 20
      revenue_cagr_5yr_min: 15
      de_max: 2.0

  dividend_champion:
    label: "Dividend Champion"
    description: "High yield, sustainable payout, positive FCF"
    filters:
      dividend_yield_min: 2
      fcf_min: 0

  debt_free_blue_chip:
    label: "Debt Free Blue Chip"
    description: "Zero debt, strong ROE, large revenue base"
    filters:
      de_max: 0.1
      roe_min: 12
      sales_min: 5000

  turnaround_watch:
    label: "Turnaround Watch"
    description: "Strong recent revenue growth and positive FCF"
    filters:
      revenue_cagr_5yr_min: 10
      fcf_min: 0